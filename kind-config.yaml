# kind 클러스터 자체의 설정 (쿠버네티스 리소스 YAML이 아니라 kind 도구 전용 설정)
# ingress-nginx가 클러스터 밖(호스트) 80/443 포트를 그대로 받아 처리할 수 있도록
# 노드 생성 시점에 포트 매핑 + ingress-ready 라벨을 지정해야 함(둘 다 클러스터를 새로 만들어야 적용됨).
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: omok
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
